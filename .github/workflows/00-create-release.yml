name: Create a release

on:
    # main ブランチに変更が push されたときにジョブを実行します。
    push:
        branches: ["main"]

    # Web UI から手動でトリガーします。
    workflow_dispatch:

jobs:
    # CREATE A RELEASE AND UPLOAD EXECUTABLE FILE
    create-releases:
        runs-on: windows-latest
        needs: [build-on-windows, build-on-linux]
        permissions:
            # "write" permission is required to create a release. (NO NEED to grant at repository settings.)
            contents: write
        steps:
            # ========== CHECKOUT REPOSITORY ==========
          - name: Checkout
            uses: actions/checkout@v4
            with:
                fetch-depth: 1

            # ========== INSTALL gh-create-release ==========
          - name: Install gh-create-release
            run: cargo install --git https://github.com/mass10/r-gh-create-release

            # ========== DOWNLOAD ARTIFACTS ==========
          - name: Download Windows artifacts
            uses: actions/download-artifact@v4
            with:
                name: artifacts-windows

          - name: Download Linux artifacts
            uses: actions/download-artifact@v4
            with:
                name: artifacts-linux

            # ========== CREATE RELEASE AND UPLOAD EXECUTABLE FILE ==========
          - name: Create release
            run: r-gh-create-release
                  --determine-version-from Cargo.toml
                  --file imgodr-rs.exe
                  --file imgodr-rs
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # ========== CARGO PUBLISH ==========
          - name: Publish on crates.io
            run: cargo publish --token "${{ secrets.CRATES_IO_TOKEN }}"

    # FOR WINDOWS
    build-on-windows:
        runs-on: windows-latest
        steps:
            # ========== CHECKOUT REPOSITORY ==========
          - name: Checkout
            uses: actions/checkout@v4
            with:
                fetch-depth: 1

            # ========== BUILD APPLICATION FOR WINDOWS ==========
          - name: Create the app package
            run: cargo.exe build --release

            # ========== CREATE ARTIFACTS ==========
          - name: Create Release
            uses: actions/upload-artifact@v4
            with:
                name: artifacts-windows
                path: target\release\imgodr-rs.exe

    # FOR LINUX
    build-on-linux:
        runs-on: ubuntu-latest
        steps:
            # ========== CHECKOUT REPOSITORY ==========
          - name: Checkout
            uses: actions/checkout@v4
            with:
                fetch-depth: 1

            # ========== Build for Linux ==========
          - name: Create the app package
            run: cargo build --release

            # ========== Create artifacts ==========
          - name: Create Release
            uses: actions/upload-artifact@v4
            with:
                name: artifacts-linux
                path: target/release/imgodr-rs
